<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Brandivibe Maps Scraper</title>
<link rel="stylesheet" href="popup.css" />
</head>
<body>

<div class="root">

  <!-- Animated gradient mesh background -->
  <div class="mesh">
    <div class="orb orb-cyan"></div>
    <div class="orb orb-violet"></div>
    <div class="orb orb-deep"></div>
  </div>

  <main class="content">

    <header class="header">
      <div class="eyebrow">
        <span class="dash"></span>
        BRANDIVIBE &middot; MAPS SCRAPER
      </div>
      <h1 class="title">
        Pull leads from <em>Maps</em>
      </h1>
    </header>

    <!-- ─────────── Targeting form ─────────── -->
    <section class="form-section">
      <div class="field">
        <label for="selCategory">Industry / Category</label>
        <select id="selCategory" aria-label="Industry or category">
          <option value="">— pick a business type —</option>
        </select>
      </div>

      <div class="field">
        <label for="selCountry">Country</label>
        <select id="selCountry" aria-label="Country">
          <option value="">— pick a country —</option>
        </select>
      </div>

      <div class="field">
        <label for="selState">State / Region</label>
        <select id="selState" aria-label="State or region" disabled>
          <option value="">— pick a country first —</option>
        </select>
      </div>

      <div class="field">
        <label for="selCity">City</label>
        <select id="selCity" aria-label="City" disabled>
          <option value="">— pick a state first —</option>
        </select>
      </div>

      <button type="button" class="btn btn-ghost btn-open-maps" id="btnOpenMaps" disabled>
        <span class="btn-icon">→</span>
        Open Google Maps with this search
      </button>
    </section>

    <div class="divider"></div>

    <!-- ─────────── Stats strip ─────────── -->
    <div class="stats" id="statsRow">
      <div class="stat">
        <div class="stat-label">With website</div>
        <div class="stat-value" id="statFound">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Synced total</div>
        <div class="stat-value" id="statSynced">0</div>
      </div>
    </div>

    <!-- ─────────── Actions ─────────── -->
    <div class="actions">
      <button type="button" class="btn btn-primary" id="btnScrape">
        <span class="btn-icon">◆</span>
        <span id="btnScrapeLabel">Scrape this page</span>
      </button>

      <button type="button" class="btn btn-ghost" id="btnSync" disabled>
        Send to dashboard
      </button>
    </div>

    <!-- Status line -->
    <div class="status" id="status">
      <span class="dot"></span>
      <span id="statusText">Fill the form above to start</span>
    </div>

    <!-- Results preview -->
    <div class="preview" id="preview"></div>

    <footer class="footer">
      <a href="https://brandivibe.com/dashboard" target="_blank" rel="noopener">
        Open dashboard →
      </a>
      <a href="#" id="btnResetDedupe" class="footer-secondary">Reset dedupe history</a>
    </footer>

  </main>
</div>

<script src="data.js"></script>
<script src="popup.js"></script>
</body>
</html>

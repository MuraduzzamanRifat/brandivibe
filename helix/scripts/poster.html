<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Helix — Certificate Poster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&family=Exo+2:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c18;
    --bg-2: #0b1120;
    --ink: #f4e6c0;
    --ink-dim: rgba(244, 230, 192, 0.55);
    --ink-faint: rgba(244, 230, 192, 0.2);
    --gold: #fbbf24;
    --gold-deep: #d97706;
    --gold-pale: #fef3c7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: "Exo 2", sans-serif; }
  body {
    width: 1200px;
    height: 1600px;
    padding: 80px 88px;
    position: relative;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    background: radial-gradient(ellipse 70% 50% at 50% 40%, rgba(251, 191, 36, 0.08), transparent 70%), var(--bg);
  }

  /* subtle grid */
  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(251, 191, 36, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(251, 191, 36, 0.04) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
  }

  /* noise */
  body::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.95'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
    opacity: 0.025;
    mix-blend-mode: screen;
    pointer-events: none;
  }

  /* ornate corner rules */
  .corner {
    position: absolute;
    width: 80px;
    height: 80px;
    border: 1px solid var(--gold);
    opacity: 0.45;
  }
  .corner.tl { top: 40px; left: 40px; border-right: 0; border-bottom: 0; }
  .corner.tr { top: 40px; right: 40px; border-left: 0; border-bottom: 0; }
  .corner.bl { bottom: 40px; left: 40px; border-right: 0; border-top: 0; }
  .corner.br { bottom: 40px; right: 40px; border-left: 0; border-top: 0; }

  /* Header */
  .header {
    position: relative;
    padding-top: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .seal {
    width: 86px;
    height: 86px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    position: relative;
    display: grid;
    place-items: center;
    background: radial-gradient(circle at 50% 40%, rgba(251, 191, 36, 0.18), transparent);
  }
  .seal::before {
    content: "";
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    border: 1px dashed rgba(251, 191, 36, 0.35);
  }
  .seal .mark {
    font-family: "Orbitron", sans-serif;
    font-size: 42px;
    color: var(--gold);
    font-weight: 800;
  }

  .topmeta {
    font-family: "Space Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--ink-dim);
    text-align: center;
  }
  .topmeta .line { display: block; margin-top: 6px; color: var(--ink-faint); }

  /* central */
  .center {
    position: absolute;
    inset: 340px 88px 420px 88px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .label-strip {
    display: flex;
    align-items: center;
    gap: 18px;
    font-family: "Space Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 40px;
  }
  .label-strip .line {
    display: inline-block;
    width: 48px;
    height: 1px;
    background: var(--ink-faint);
  }

  h1.headline {
    font-family: "Orbitron", sans-serif;
    font-weight: 700;
    font-size: 128px;
    line-height: 0.9;
    letter-spacing: -0.02em;
    color: var(--ink);
    text-shadow: 0 0 40px rgba(251, 191, 36, 0.15);
  }
  h1.headline .line-2 {
    display: block;
    background: linear-gradient(180deg, var(--gold-pale) 0%, var(--gold) 50%, var(--gold-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 800;
    text-shadow: 0 0 60px rgba(251, 191, 36, 0.3);
  }
  h1.headline .line-3 {
    display: block;
    font-style: italic;
    font-weight: 400;
    color: var(--ink-dim);
    font-size: 96px;
    margin-top: 8px;
  }

  .tagline {
    margin-top: 36px;
    font-family: "Space Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  /* stats row */
  .stats {
    position: absolute;
    left: 120px;
    right: 120px;
    bottom: 250px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    padding: 24px 0;
    border-top: 1px solid rgba(251, 191, 36, 0.2);
    border-bottom: 1px solid rgba(251, 191, 36, 0.2);
  }
  .stats .s {
    text-align: center;
  }
  .stats .s .l {
    display: block;
    font-family: "Space Mono", monospace;
    font-size: 8px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }
  .stats .s .v {
    display: block;
    font-family: "Orbitron", sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--gold);
  }

  /* footer */
  .footer {
    position: absolute;
    left: 88px;
    right: 88px;
    bottom: 100px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-family: "Space Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .footer .stamp {
    border: 1px solid var(--gold);
    padding: 8px 14px;
    color: var(--gold);
    font-size: 9px;
    letter-spacing: 0.32em;
  }

  /* chevron ticks along the sides */
  .ticks-left, .ticks-right {
    position: absolute;
    top: 200px;
    bottom: 200px;
    width: 8px;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
  }
  .ticks-left { left: 64px; }
  .ticks-right { right: 64px; }
  .ticks-left span, .ticks-right span {
    width: 6px;
    height: 1px;
    background: var(--ink-faint);
  }
  .ticks-left span:nth-child(5n+1),
  .ticks-right span:nth-child(5n+1) {
    width: 12px;
    background: var(--gold);
  }
</style>
</head>
<body>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="ticks-left">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="ticks-right">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="header">
    <div class="seal"><div class="mark">H</div></div>
    <div class="topmeta">
      HELIX · LIQUID STAKING PROTOCOL
      <span class="line">CERTIFICATE OF RESERVE · SERIES MMXXVI</span>
    </div>
  </div>

  <div class="center">
    <div class="label-strip">
      <span class="line"></span>
      INSTITUTIONAL GRADE
      <span class="line"></span>
    </div>
    <h1 class="headline">
      Stake ETH.<br/>
      <span class="line-2">Earn yield.</span>
      <span class="line-3">Stay liquid.</span>
    </h1>
    <div class="tagline">AUDITED · NON-CUSTODIAL · ON-CHAIN</div>
  </div>

  <div class="stats">
    <div class="s"><span class="l">TVL</span><span class="v">$4.8B</span></div>
    <div class="s"><span class="l">APY</span><span class="v">4.82%</span></div>
    <div class="s"><span class="l">Validators</span><span class="v">12K+</span></div>
    <div class="s"><span class="l">Audits</span><span class="v">3 FIRMS</span></div>
  </div>

  <div class="footer">
    <span>PLATE I · HELIX PROTOCOL · 2026</span>
    <span class="stamp">VERIFIED · 0xHe11x···9F2a</span>
    <span>TRAIL · OZ · CERTORA</span>
  </div>
</body>
</html>

name: Brandivibe brain source pulse (15-min)

# Every 15 min: scrape the feeds, stage new article URLs in
# brain.rawSourcePool. No GPT spend. The hourly tick consumes the pool.
# Runs inside GitHub Actions (no Koyeb).

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/_brain-runner.yml
    with:
      task: source-pulse
      timeout-minutes: 8
    secrets: inherit

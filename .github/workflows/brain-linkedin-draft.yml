name: Brandivibe brain LinkedIn DM drafter (4-hourly)

# Every 4h: generate personalized LinkedIn DM drafts for top-tier prospects.
# Drafts queue in brain.linkedInDrafts for manual copy-paste send (never
# auto-sends — LinkedIn bans automation). Runs in GitHub Actions (no Koyeb).

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/_brain-runner.yml
    with:
      task: linkedin-draft
      timeout-minutes: 10
    secrets: inherit

name: Brandivibe brain daily tick

# Full daily pipeline: plan → article → FB → score → source → leadgen →
# research → sequence → send → blast. Runs inside GitHub Actions (no Koyeb).
# Idempotent + resumable via the DailyRun ledger; runs twice 30s apart.

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/_brain-runner.yml
    with:
      task: daily
      timeout-minutes: 25
      twice: true
    secrets: inherit

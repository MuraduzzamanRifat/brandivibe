name: Brandivibe brain daily tick

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fire run-daily
        run: |
          curl -fsS --max-time 540 -X POST \
            https://brandivibe.com/api/brain/run-daily \
            -H "x-brain-secret: ${{ secrets.BRAIN_CRON_SECRET }}" \
            -o response.json
          echo "--- response ---"
          cat response.json

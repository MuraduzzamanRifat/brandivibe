name: Brandivibe brain health check

# Every 6h (01:00, 07:00, 13:00, 19:00 UTC): diagnose pipeline issues,
# auto-fix what it can, email the operator on unresolved criticals.
# Runs inside GitHub Actions (no Koyeb).

on:
  schedule:
    - cron: "0 1,7,13,19 * * *"
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/_brain-runner.yml
    with:
      task: health
      timeout-minutes: 8
    secrets: inherit

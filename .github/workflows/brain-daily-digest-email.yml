name: Brandivibe brain daily digest email

# 14:00 UTC (1h after the daily tick): email the yesterday-summary digest
# to NOTIFICATION_EMAIL. Runs inside GitHub Actions (no Koyeb).

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/_brain-runner.yml
    with:
      task: daily-digest-email
      timeout-minutes: 8
    secrets: inherit

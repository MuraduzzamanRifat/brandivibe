name: 🎯 Brain — start hunting now

# Manual one-click pipeline: fire every lead-gen channel in sequence so a
# human-triggered "start hunting" runs the whole sourcing → research →
# outreach loop without waiting for the cron schedules. Runs inside GitHub
# Actions (no Koyeb). source-pulse stages signals before daily extracts
# them; twitter + linkedin fan out after.

on:
  workflow_dispatch:

jobs:
  source:
    name: 1. Source pulse (stage feed signals)
    uses: ./.github/workflows/_brain-runner.yml
    with:
      task: source-pulse
      timeout-minutes: 8
    secrets: inherit

  daily:
    name: 2. Daily pipeline (extract → research → email)
    needs: source
    uses: ./.github/workflows/_brain-runner.yml
    with:
      task: daily
      timeout-minutes: 25
      twice: true
    secrets: inherit

  hourly:
    name: 3. Hourly tick (send queued + advance sequences)
    needs: daily
    uses: ./.github/workflows/_brain-runner.yml
    with:
      task: hourly
      timeout-minutes: 12
    secrets: inherit

  twitter:
    name: 4. Twitter intent (parallel)
    needs: source
    uses: ./.github/workflows/_brain-runner.yml
    with:
      task: twitter-intent
      timeout-minutes: 10
    secrets: inherit

  linkedin:
    name: 5. LinkedIn drafter (parallel)
    needs: daily
    uses: ./.github/workflows/_brain-runner.yml
    with:
      task: linkedin-draft
      timeout-minutes: 10
    secrets: inherit

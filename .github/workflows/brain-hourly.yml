name: Brandivibe brain hourly tick (manual only)

# Scheduled runs have been DISABLED to keep the brain on a once-per-day
# cadence (brain-daily.yml covers it). The workflow is preserved so it can
# be triggered manually from the Actions tab when you want to run an ad-hoc
# throughput tick (send queued emails, advance sequences, etc.) without
# waiting for the next daily run.
#
# To re-enable hourly scheduling: restore the `schedule:` block below.
#   schedule:
#     - cron: "0 * * * *"  # every hour on the hour

on:
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Manual tick
        run: |
          curl -fsS --max-time 310 -X POST \
            https://brandivibe.com/api/brain/tick-hourly \
            -H "x-brain-secret: ${{ secrets.BRAIN_CRON_SECRET }}" \
            -o response.json
          echo "--- manual tick ---"
          cat response.json

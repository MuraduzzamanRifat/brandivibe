name: Brandivibe brain hourly tick

# Re-enabled for always-on operation. Sends queued emails, advances
# sequences, deep-researches new prospects.

on:
  schedule:
    - cron: "0 * * * *"  # every hour on the hour
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Manual tick
        run: |
          curl -fsS --max-time 310 -X POST \
            https://brandivibe.com/api/brain/tick-hourly \
            -H "x-brain-secret: ${{ secrets.BRAIN_CRON_SECRET }}" \
            -o response.json
          echo "--- manual tick ---"
          cat response.json

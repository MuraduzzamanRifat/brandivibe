name: Brandivibe brain hourly tick

# Lightweight throughput tick: source → leadgen → research → sequence →
# send → blast. Runs inside GitHub Actions (no Koyeb).

on:
  schedule:
    - cron: "0 * * * *"  # every hour on the hour
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/_brain-runner.yml
    with:
      task: hourly
      timeout-minutes: 12
    secrets: inherit

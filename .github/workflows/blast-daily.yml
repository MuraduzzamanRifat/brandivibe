name: Brandivibe blast daily tick

# 11:00 UTC: process the cold-email blast drip (one daily batch).
# Runs inside GitHub Actions (no Koyeb).

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/_brain-runner.yml
    with:
      task: blast-daily
      timeout-minutes: 15
    secrets: inherit

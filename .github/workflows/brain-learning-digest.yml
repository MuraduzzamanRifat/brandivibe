name: Brandivibe brain learning digest (weekly)

# Mondays 14:00 UTC: aggregate the past 7 days of outbound performance into
# LearningEntry records the planner reads next run. GitHub Actions (no Koyeb).

on:
  schedule:
    - cron: "0 14 * * 1"  # Monday 14:00 UTC
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/_brain-runner.yml
    with:
      task: learning-digest
      timeout-minutes: 12
    secrets: inherit

name: Brandivibe brain Twitter intent scraper (2-hourly)

# Every 2h: scrape X/Twitter (public Nitter mirrors) for buy-intent tweets
# (founders saying "looking for a designer", "redesigning our site", etc.).
# Leads land in brain.twitterIntent. Runs inside GitHub Actions (no Koyeb).

on:
  schedule:
    - cron: "30 */2 * * *"
  workflow_dispatch:

jobs:
  run:
    uses: ./.github/workflows/_brain-runner.yml
    with:
      task: twitter-intent
      timeout-minutes: 10
    secrets: inherit
